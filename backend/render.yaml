services:
  - type: web
    name: brownies-api
    rootDir: backend
    env: node
    plan: free
    healthCheckPath: /health
    buildCommand: npm install && npm run build
    startCommand: npm run migration:run && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_SSL
        value: true
      - key: DATABASE_URL
        fromDatabase:
          name: brownies-db
          property: connectionString

databases:
  - name: brownies-db
    databaseName: brownies
    user: brownies
    plan: free
